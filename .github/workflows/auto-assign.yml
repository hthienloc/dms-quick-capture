name: Auto Assign Issues & PRs
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened, reopened]

env:
  ASSIGNEE: hthienloc

jobs:
  assign:
    # Gate trigger to prevent running if the actor is hthienloc.
    # pull_request_target runs in target context with write permissions, supporting forks safely.
    if: github.actor != 'hthienloc'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Assign to me
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: [process.env.ASSIGNEE]
            })
