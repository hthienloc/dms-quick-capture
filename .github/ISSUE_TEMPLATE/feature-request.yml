name: 💡 Feature Request
description: Suggest an idea or enhancement for DMS Quick Capture
title: "[Feature]: "
labels: ["enhancement"]
assignees: ["hthienloc"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is (e.g. "I am frustrated when...").
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A detailed description of the behavior or feature you want added.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or workarounds you've thought of.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
