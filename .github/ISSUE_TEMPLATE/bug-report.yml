name: 🐛 Bug Report
description: Report a bug or unexpected behavior in DMS Quick Capture
title: "[Bug]: "
labels: ["bug"]
assignees: ["hthienloc"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much information as possible to help us reproduce and fix the issue.
  - type: input
    id: dms_version
    attributes:
      label: DankMaterialShell (DMS) Version
      placeholder: e.g. 1.5.2
    validations:
      required: true
  - type: input
    id: plugin_version
    attributes:
      label: Quick Capture Plugin Version
      placeholder: e.g. 2.7.3
    validations:
      required: true
  - type: input
    id: os_info
    attributes:
      label: Operating System / Linux Distribution
      placeholder: e.g. Fedora 40 (Workstation), Arch Linux
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Explain how we can reproduce this bug. Numbered steps are preferred.
      placeholder: |
        1. Open Quick Capture
        2. Select OCR tool
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs_or_screenshots
    attributes:
      label: Relevant Logs or Screenshots
      description: Please attach QML runtime logs (using `journalctl --user-unit dms`) or visual screenshots.
